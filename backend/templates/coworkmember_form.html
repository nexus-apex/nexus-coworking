{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} CoworkMember | NexusCoworking{% endblock %}
{% block page_title %}{% if editing %}Edit CoworkMember{% else %}New CoworkMember{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ record.email|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" value="{{ record.phone|default:'' }}">
      </div>
      <div class="form-group">
        <label>Company</label>
        <input type="text" name="company" value="{{ record.company|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Plan</label>
        <select name="plan">
          <option value="day_pass" {% if record.plan == 'day_pass' %}selected{% endif %}>Day Pass</option>
          <option value="weekly" {% if record.plan == 'weekly' %}selected{% endif %}>Weekly</option>
          <option value="monthly" {% if record.plan == 'monthly' %}selected{% endif %}>Monthly</option>
          <option value="annual" {% if record.plan == 'annual' %}selected{% endif %}>Annual</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="expired" {% if record.status == 'expired' %}selected{% endif %}>Expired</option>
          <option value="cancelled" {% if record.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Joined Date</label>
        <input type="date" name="joined_date" value="{{ record.joined_date|date:'Y-m-d'|default:'' }}">
      </div>
      <div class="form-group">
        <label>Credits</label>
        <input type="number" name="credits" value="{{ record.credits|default:'0' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} CoworkMember</button>
      <a href="/coworkmembers/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
